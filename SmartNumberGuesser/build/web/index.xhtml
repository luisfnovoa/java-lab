<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>Smart Number Guesser</title>
    <style type="text/css">
        /*<![CDATA[*/
        body { font-family: 'Segoe UI', sans-serif; background-color: #1e1e24; color: #f7f7f9; padding: 20px; }
        .main-wrapper { width: 100%; max-width: 1000px; margin: 0 auto; }
        .panel-izquierdo { width: 63%; float: left; background-color: #2a2a35; border-radius: 8px; padding: 20px; box-sizing: border-box; }
        .panel-derecho { width: 33%; float: right; background-color: #2a2a35; border-radius: 8px; padding: 20px; box-sizing: border-box; }
        .panel-inferior { width: 100%; clear: both; background-color: #2a2a35; border-radius: 8px; padding: 20px; margin-top: 20px; box-sizing: border-box; }
        h1, h2, h3 { color: #4f46e5; margin-top: 0; }
        .corazones-container { margin: 10px 0; }
        .corazon { color: #ef4444; font-size: 24px; display: inline-block; }
        .progress-bar-bg { background-color: #444454; border-radius: 10px; height: 20px; width: 100%; overflow: hidden; margin-bottom: 15px; }
        .progress-bar-fill { background-color: #4f46e5; height: 100%; }
        .input-number { background-color: #3f3f4e; border: 2px solid #4f46e5; color: white; padding: 10px; font-size: 18px; border-radius: 5px; width: 120px; text-align: center; }
        .btn { background-color: #4f46e5; color: white; border: none; padding: 11px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-secondary { background-color: #10b981; }
        .feedback-MuyCaliente { color: #f97316; font-weight: bold; font-size: 20px; }
        .feedback-Caliente { color: #fbcfe8; font-weight: bold; }
        .feedback-Tibio { color: #60a5fa; }
        .feedback-Frio { color: #9ca3af; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #3f3f4e; }
        th { background-color: #313143; color: #4f46e5; }
        .badge-win { background-color: #065f46; color: #34d399; padding: 3px 8px; border-radius: 4px; }
        .badge-lose { background-color: #7f1d1d; color: #fca5a5; padding: 3px 8px; border-radius: 4px; }
        /*]]>*/
    </style>

    <script type="text/javascript">
        function mantenerFocoTeclado(data) {
            if (data.status === 'success') {
                var inputJuego = document.getElementById('gameForm:numeroUsuario');
                if (inputJuego &amp;&amp; !inputJuego.disabled) {
                    inputJuego.focus();
                    inputJuego.select();
                }
            }
        }
    </script>
</h:head>
<h:body>

    <div class="main-wrapper">
        
        <div class="panel-izquierdo">
            <h1>Smart Number Guesser</h1>
            
            <h:form id="configForm">
                <h:panelGrid columns="4" cellpadding="5">
                    <h:outputLabel value="Nivel: " for="nivelSelect" />
                    <h:selectOneMenu id="nivelSelect" value="#{adivinaBean.nivel}" 
                                     disabled="#{not adivinaBean.juegoTerminado and not empty adivinaBean.intentosPartidaActual}">
                        <f:selectItem itemValue="BASICO" itemLabel="Básico (0-99)" />
                        <f:selectItem itemValue="INTERMEDIO" itemLabel="Intermedio (100-500)" />
                        <f:selectItem itemValue="AVANZADO" itemLabel="Avanzado (500-1000)" />
                        <f:ajax event="change" execute="@this" render="@form :gameForm" listener="#{adivinaBean.nuevaPartida}"/>
                    </h:selectOneMenu>

                    <h:outputLabel value="Modo Experto (IA):" for="expertoCheck"/>
                    <h:selectBooleanCheckbox id="expertoCheck" value="#{adivinaBean.modoExperto}" 
                                             disabled="#{not adivinaBean.juegoTerminado and not empty adivinaBean.intentosPartidaActual}">
                        <f:ajax event="change" execute="@this" render="@form :gameForm" />
                    </h:selectBooleanCheckbox>
                </h:panelGrid>
                
                <div style="margin: 15px 0;">
                    <h:commandButton value="Reiniciar Partida Actual" action="#{adivinaBean.nuevaPartida}" styleClass="btn btn-secondary"/>
                </div>
            </h:form>

            <hr style="border: 1px solid #3f3f4e; margin: 20px 0;"/>

            <h:form id="gameForm">
                <h3>Adivina el número entre #{adivinaBean.rangoMin} y #{adivinaBean.rangoMax}</h3>
                
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" style="width: #{adivinaBean.porcentajeVidasBarra}%;"></div>
                </div>

                <div class="corazones-container">
                    <ui:repeat value="#{adivinaBean.listaCorazones}" var="corazon">
                        <span class="corazon">#{corazon}</span>
                    </ui:repeat>
                    <h:outputText value=" Sin vidas" rendered="#{adivinaBean.vidasRestantes eq 0}" style="color:#ef4444; font-weight:bold;"/>
                </div>

                <div style="margin-top:20px;">
                    <h:inputText id="numeroUsuario" 
                                 value="#{adivinaBean.numeroUsuario}" 
                                 styleClass="input-number" 
                                 disabled="#{adivinaBean.juegoTerminado}" 
                                 autocomplete="off"
                                 onkeypress="if (event.keyCode === 13) { document.getElementById('gameForm:probarBtn').click(); return false; }">
                    </h:inputText>
                    
                    <h:commandButton id="probarBtn" value="Probar" action="#{adivinaBean.procesarIntento}" 
                                     styleClass="btn" style="margin-left: 10px;" disabled="#{adivinaBean.juegoTerminado}">
                        <f:ajax execute="@form" render="@form :panelDerechoForm" onevent="mantenerFocoTeclado" />
                    </h:commandButton>
                </div>

                <div style="margin-top: 25px; padding: 15px; background-color: #21212b; border-left: 4px solid #4f46e5;">
                    <p style="margin: 0 0 10px 0; font-size: 18px;"><h:outputText value="#{adivinaBean.mensaje}" /></p>
                    
                    <h:outputText value="Termómetro: #{adivinaBean.feedbackCalor}" 
                                  styleClass="feedback-#{adivinaBean.feedbackCalorEstilo}" 
                                  rendered="#{not empty adivinaBean.feedbackCalor}"/>
                </div>
                
                <div style="margin-top:10px;">
                    <h:outputText value="Historial de intentos: #{adivinaBean.intentosPartidaActual}" style="color:#9ca3af; font-size:14px;"/>
                </div>
            </h:form>
        </div>

        <div class="panel-derecho">
            <h2>Métricas</h2>
            <h:form id="panelDerechoForm">
                <h:panelGrid columns="2" width="100%" cellpadding="8" style="background-color: #21212b; border-radius: 5px;">
                    <h:outputText value="Partidas:" />
                    <h:outputText value="#{adivinaBean.partidasJugadas}" style="font-weight:bold;" />

                    <h:outputText value="Intentos:" />
                    <h:outputText value="#{adivinaBean.intentosTotales}" style="font-weight:bold;" />

                    <h:outputText value="% Aciertos:" />
                    <h:outputText value="#{adivinaBean.porcentajeAciertos}" style="font-weight:bold; color:#10b981;">
                        <f:convertNumber maxFractionDigits="1" type="number"/>
                    </h:outputText>

                    <h:outputText value="Tiempo medio:" />
                    <h:outputText value="#{adivinaBean.tiempoPromedioIntento}" style="font-weight:bold; color:#f59e0b;">
                        <f:convertNumber maxFractionDigits="2" type="number"/>
                    </h:outputText>
                </h:panelGrid>
            </h:form>
        </div>

        <div class="panel-inferior">
            <h2>Historial General de Partidas</h2>
            <h:dataTable value="#{adivinaBean.historialPartidas}" var="p" styleClass="table">
                <h:column><f:facet name="header">ID</f:facet>#{p.id}</h:column>
                <h:column><f:facet name="header">Nivel</f:facet>#{p.modoNivel}</h:column>
                <h:column><f:facet name="header">Intentos</f:facet>#{p.intentos}</h:column>
                <h:column><f:facet name="header">Secreto</f:facet>#{p.numSecreto}</h:column>
                <h:column>
                    <f:facet name="header">Resultado</f:facet>
                    <h:panelGroup styleClass="badge-win" rendered="#{p.resultado eq 'GANADA'}">#{p.resultado}</h:panelGroup>
                    <h:panelGroup styleClass="badge-lose" rendered="#{p.resultado eq 'PERDIDA'}">#{p.resultado}</h:panelGroup>
                </h:column>
            </h:dataTable>
        </div>
        
    </div>

</h:body>
</html>
